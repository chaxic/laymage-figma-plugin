<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 12px;
        color: var(--figma-color-text, #333);
      }
      body {
        margin: 0;
        padding: 12px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 500;
      }
      .row {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 10px;
      }
      input[type="number"] {
        box-sizing: border-box;
        padding: 6px 8px;
        border: 1px solid var(--figma-color-border, #ccc);
        border-radius: 4px;
        background: var(--figma-color-bg, #fff);
        color: inherit;
      }
      button {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        border: none;
        border-radius: 4px;
        background: var(--figma-color-bg-brand, #0d99ff);
        color: var(--figma-color-text-onbrand, #fff);
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .hint {
        margin-top: 10px;
        color: var(--figma-color-text-secondary, #666);
        line-height: 1.4;
      }
      details.plugin-group {
        border: 1px solid var(--figma-color-border, #ccc);
        border-radius: 4px;
        margin: 0;
        overflow: hidden;
      }
      details.plugin-group summary {
        font-weight: 500;
        padding: 8px 10px;
        cursor: pointer;
        user-select: none;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      details.plugin-group summary::-webkit-details-marker {
        display: none;
      }
      details.plugin-group summary::before {
        content: "";
        display: block;
        flex-shrink: 0;
        width: 0;
        height: 0;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        border-left: 9px solid var(--figma-color-text, #333);
        opacity: 0.85;
        transition: transform 0.15s ease;
        transform-origin: 40% 50%;
      }
      details.plugin-group[open] summary::before {
        transform: rotate(90deg);
      }
      details.plugin-group .group-body {
        padding: 8px 10px 10px;
        border-top: 1px solid var(--figma-color-border, #ccc);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .labeled-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .labeled-row label {
        margin: 0;
        font-weight: 500;
        flex-shrink: 0;
      }
      .labeled-row input[type="number"] {
        flex: 1;
        min-width: 0;
        width: auto;
      }
      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .checkbox-row label {
        margin: 0;
        font-weight: 500;
        flex: 1;
      }
      .checkbox-row label.video-outline-label {
        font-weight: 700;
      }
      .pre-apply-block {
        margin-bottom: 8px;
      }
      .checkbox-row input[type="checkbox"] {
        flex-shrink: 0;
      }
      .radio-option {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .radio-option label {
        margin: 0;
        font-weight: 400;
        flex: 1;
      }
      .radio-option input[type="radio"] {
        flex-shrink: 0;
      }
      #gapSplitSection,
      #gapUnifiedSection {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="labeled-row">
        <label for="columns" title="How many columns to flow items into.">Columns</label>
        <input
          id="columns"
          type="number"
          min="1"
          max="24"
          value="3"
          title="How many columns to flow items into."
        />
      </div>
      <div class="checkbox-row">
        <label
          for="uniformColumns"
          title="Use the same column width for every column (based on the widest header)."
          >Uniform columns</label
        >
        <input
          id="uniformColumns"
          type="checkbox"
          title="Use the same column width for every column (based on the widest header)."
        />
      </div>
      <div class="checkbox-row">
        <label
          for="lockBounds"
          title="Keep the selection’s overall width the same by scaling column widths to fit within the original bounds."
          >Lock bounds</label
        >
        <input
          id="lockBounds"
          type="checkbox"
          title="Keep the selection’s overall width the same by scaling column widths to fit within the original bounds."
        />
      </div>
      <div class="checkbox-row">
        <label
          for="detectColumns"
          title="Auto-set Columns based on how many selected layers share the top row (same y within 1px). If fewer than two share that row, uses 1."
          >Detect columns</label
        >
        <input
          id="detectColumns"
          type="checkbox"
          title="Auto-set Columns based on how many selected layers share the top row (same y within 1px). If fewer than two share that row, uses 1."
        />
      </div>
    </div>
    <div class="row">
      <div id="gapSplitSection">
        <div class="labeled-row">
          <label
            for="gapX"
            title="Horizontal space between columns, measured between visible stroke edges when strokes are enabled."
            >Horizontal gap</label
          >
          <input
            id="gapX"
            type="number"
            min="0"
            max="999"
            value="16"
            title="Horizontal space between columns, measured between visible stroke edges when strokes are enabled."
          />
        </div>
        <div class="labeled-row">
          <label
            for="gapY"
            title="Vertical space between items in a column, measured between visible stroke edges when strokes are enabled."
            >Vertical gap</label
          >
          <input
            id="gapY"
            type="number"
            min="0"
            max="999"
            value="16"
            title="Vertical space between items in a column, measured between visible stroke edges when strokes are enabled."
          />
        </div>
      </div>
      <div id="gapUnifiedSection" style="display: none">
        <div class="labeled-row">
          <label
            for="gapAll"
            title="Single gap value used for both horizontal and vertical spacing."
            >Gap</label
          >
          <input
            id="gapAll"
            type="number"
            min="0"
            max="999"
            value="16"
            title="Single gap value used for both horizontal and vertical spacing."
          />
        </div>
      </div>
      <div class="checkbox-row">
        <label
          for="uniformGaps"
          title="Use one gap value for both horizontal and vertical gaps."
          >Uniform gaps</label
        >
        <input
          id="uniformGaps"
          type="checkbox"
          title="Use one gap value for both horizontal and vertical gaps."
        />
      </div>
    </div>
    <div class="row">
      <details class="plugin-group" open>
        <summary>Arrange by</summary>
        <div class="group-body">
          <div class="radio-option">
            <label
              for="fillNearestWidth"
              title="Assign items to the column whose header width is closest to the item’s current width."
              >Nearest width</label
            >
            <input
              id="fillNearestWidth"
              type="radio"
              name="columnFillMode"
              value="nearestWidth"
              checked
              title="Assign items to the column whose header width is closest to the item’s current width."
            />
          </div>
          <div class="radio-option">
            <label
              for="fillNearestColumn"
              title="Assign items to the nearest column horizontally (based on distance to the column header’s center)."
              >Nearest column</label
            >
            <input
              id="fillNearestColumn"
              type="radio"
              name="columnFillMode"
              value="nearestColumn"
              title="Assign items to the nearest column horizontally (based on distance to the column header’s center)."
            />
          </div>
        </div>
      </details>
    </div>
    <div id="videoOutlineRow" class="pre-apply-block" style="display: none">
      <div class="checkbox-row">
        <label
          class="video-outline-label"
          for="videoOutlineFix"
          title="FigJam does not expose strokes on video media. Turn on to add 8px outline spacing in gap math so layout matches what you see on the board."
          >Video Outline Fix</label
        >
        <input
          id="videoOutlineFix"
          type="checkbox"
          title="FigJam does not expose strokes on video media. Turn on to add 8px outline spacing in gap math so layout matches what you see on the board."
        />
      </div>
    </div>
    <button
      id="apply"
      type="button"
      disabled
      title="Apply the layout to the current selection."
    >
      Apply layout
    </button>
    <p class="hint" id="hint">Select at least two layers with the same parent.</p>
    <script src="ui.js"></script>
  </body>
</html>
